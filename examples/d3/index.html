<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>vizopt — language families</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: sans-serif; }
    #app { display: flex; height: 100vh; }
    #sidebar {
      width: 220px;
      flex-shrink: 0;
      overflow-y: auto;
      padding: 12px 8px;
      background: #16213e;
      border-right: 1px solid #0f3460;
    }
    #sidebar h2 { font-size: 13px; color: #a0a0c0; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 4px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .legend-item:hover { background: #0f3460; }
    .legend-item.dimmed { opacity: 0.35; }
    .legend-swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    #canvas { flex: 1; overflow: hidden; }
    svg { display: block; }
    .set-boundary { transition: opacity 0.2s; }
    .circle-node { transition: opacity 0.2s; }
    .tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 5px 9px;
      border-radius: 5px;
      font-size: 12px;
      white-space: nowrap;
      display: none;
    }
  </style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <h2>Sets</h2>
    <div id="legend"></div>
  </aside>
  <div id="canvas"></div>
</div>
<div class="tooltip" id="tooltip"></div>

<script type="module" src="viz.js"></script>
</body>
</html>
